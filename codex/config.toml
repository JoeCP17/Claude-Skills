# Codex config backup.
# Restore target: ~/.codex/config.toml
# Run `omx setup --scope user --merge-agents --mcp none` after restore to refresh
# machine-local hook trust state.

notify = ["node", "/opt/homebrew/lib/node_modules/oh-my-codex/dist/scripts/notify-hook.js"]
model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_context_window = 250000
model_auto_compact_token_limit = 200000
developer_instructions = "You have oh-my-codex installed. AGENTS.md is the orchestration brain and main control surface. Follow AGENTS.md for skill/keyword routing, $name workflow invocation, and role-specialized subagents. Use outcome-first, concise progress updates: state the target result, constraints, validation evidence, and stop condition before adding process detail. Native subagents live in .codex/agents and may handle independent parallel subtasks within one Codex session or team pane. Skills load from .codex/skills, not native-agent TOMLs. Treat installed prompts as narrower execution surfaces under AGENTS.md authority."

[projects."/Users/ueibin"]
trust_level = "trusted"

[projects."/Users/ueibin/Desktop/LLM-Dot-files"]
trust_level = "trusted"

[profiles.fast]
model = "gpt-5.4-mini"
model_reasoning_effort = "low"

[profiles.default]
model = "gpt-5.5"
model_reasoning_effort = "medium"

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "high"

[mcp_servers.atlassian]
url = "https://mcp.atlassian.com/v1/mcp"

[mcp_servers.browsermcp]
command = "npx"
args = ["@browsermcp/mcp@latest"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.context7.env]
DEFAULT_MINIMUM_TOKENS = "6000"

[mcp_servers.datadog-mcp]
url = "https://mcp.datadoghq.com/api/unstable/mcp-server/mcp"
type = "http"

[mcp_servers.datadog-mcp.http_headers]
DD-API-KEY = "${DD_API_KEY}"
DD-APPLICATION-KEY = "${DD_APPLICATION_KEY}"

[mcp_servers.github]
command = "docker"
args = [
  "run",
  "-i",
  "--rm",
  "--env",
  "GITHUB_PERSONAL_ACCESS_TOKEN",
  "ghcr.io/github/github-mcp-server",
]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PERSONAL_ACCESS_TOKEN}"

[mcp_servers.jetbrains]
command = "npx"
args = ["-y", "@jetbrains/mcp-proxy"]

[mcp_servers.mcp-installer]
command = "npx"
args = ["@anaisbetts/mcp-installer"]

[mcp_servers.mysql-mcp-server]
command = "uvx"
args = [
  "awslabs.mysql-mcp-server@latest",
  "--hostname",
  "${MYSQL_HOSTNAME}",
  "--secret_arn",
  "${MYSQL_SECRET_ARN}",
  "--database",
  "${MYSQL_DATABASE}",
  "--region",
  "${AWS_REGION}",
  "--readonly",
  "True",
]

[mcp_servers.mysql-mcp-server.env]
AWS_PROFILE = "default"
AWS_REGION = "${AWS_REGION}"
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers.notion]
command = "npx"
args = ["-y", "@notionhq/notion-mcp-server"]

[mcp_servers.notion.env]
NOTION_TOKEN = "${NOTION_TOKEN}"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.taskmaster-ai]
command = "npx"
args = ["-y", "--package=task-master-ai", "task-master-ai"]

[mcp_servers.taskmaster-ai.env]
AWS_REGION = "us-east-1"
AWS_PROFILE = "default"
BEDROCK_ENABLED = "true"
BEDROCK_MODEL_ID = "us.anthropic.claude-sonnet-4-20250514-v1:0"

[features]
multi_agent = true
child_agents_md = true
hooks = true
goals = true

[shell_environment_policy.set]
USE_OMX_EXPLORE_CMD = "1"

[agents]
max_threads = 6
max_depth = 2

[tui]
status_line = [
  "model-with-reasoning",
  "git-branch",
  "context-remaining",
  "total-input-tokens",
  "total-output-tokens",
  "five-hour-limit",
  "weekly-limit",
]
